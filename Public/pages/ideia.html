/* ==========================================
   SISTEMA DE NOTIFICAÇÕES EMPILHADAS
   ========================================== */
.notification-container {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 10px;
    pointer-events: none;
}

.notification-toast {
    min-width: 280px;
    max-width: 350px;
    background: white;
    border-radius: 12px;
    padding: 14px 18px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
    display: flex;
    align-items: center;
    gap: 12px;
    animation: slideInRight 0.3s ease forwards;
    pointer-events: auto;
    position: relative;
    overflow: hidden;
}

/* Cores por tipo */
.notification-toast.success {
    border-left: 4px solid #28a745;
    background: linear-gradient(135deg, #ffffff 0%, #f0fff4 100%);
}

.notification-toast.success i {
    color: #28a745;
}

.notification-toast.error {
    border-left: 4px solid #dc3545;
    background: linear-gradient(135deg, #ffffff 0%, #fff5f5 100%);
}

.notification-toast.error i {
    color: #dc3545;
}

.notification-toast.info {
    border-left: 4px solid #17a2b8;
    background: linear-gradient(135deg, #ffffff 0%, #e6f7ff 100%);
}

.notification-toast.info i {
    color: #17a2b8;
}

.notification-toast.warning {
    border-left: 4px solid #ffc107;
    background: linear-gradient(135deg, #ffffff 0%, #fff8e7 100%);
}

.notification-toast.warning i {
    color: #ffc107;
}

/* Ícone */
.notification-icon {
    font-size: 22px;
    flex-shrink: 0;
}

/* Conteúdo */
.notification-content {
    flex: 1;
}

.notification-title {
    font-weight: 600;
    font-size: 14px;
    color: #2d3748;
    margin-bottom: 4px;
}

.notification-message {
    font-size: 13px;
    color: #4a5568;
    line-height: 1.4;
}

/* Barra de progresso (fade out) */
.notification-progress {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 3px;
    background: rgba(0, 0, 0, 0.1);
    animation: progressShrink 3s linear forwards;
}

.notification-toast.success .notification-progress {
    background: #28a745;
}

.notification-toast.error .notification-progress {
    background: #dc3545;
}

.notification-toast.info .notification-progress {
    background: #17a2b8;
}

.notification-toast.warning .notification-progress {
    background: #ffc107;
}

/* Botão fechar */
.notification-close {
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
    color: #a0aec0;
    padding: 0 4px;
    transition: color 0.2s;
    flex-shrink: 0;
}

.notification-close:hover {
    color: #4a5568;
}

/* Animações */
@keyframes slideInRight {
    from {
        transform: translateX(100%);
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }
}

@keyframes slideOutRight {
    from {
        transform: translateX(0);
        opacity: 1;
    }
    to {
        transform: translateX(100%);
        opacity: 0;
    }
}

@keyframes progressShrink {
    from {
        width: 100%;
    }
    to {
        width: 0%;
    }
}

.notification-toast.removing {
    animation: slideOutRight 0.3s ease forwards;
}

/* Ícones animados para notificações */
.notification-toast.success i.fa-heart {
    animation: heartbeat 0.5s ease;
}

.notification-toast.success i.fa-check-circle {
    animation: scaleIn 0.3s ease;
}

.notification-toast.info i.fa-info-circle {
    animation: pulse 0.5s ease;
}

.notification-toast.warning i.fa-exclamation-triangle {
    animation: shake 0.3s ease;
}

@keyframes scaleIn {
    from { transform: scale(0); }
    to { transform: scale(1); }
}

@keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2); }
}

@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-3px); }
    75% { transform: translateX(3px); }
}

function mostrarAbaIdeia(aba) {
    const comentariosSection = document.getElementById('comentariosSection');
    const historicoSection = document.getElementById('historicoSection');
    const botoes = document.querySelectorAll('.tab-ideia-btn');
    
    // Remover active de todos os botões
    botoes.forEach(btn => btn.classList.remove('active'));
    
    if (aba === 'comentarios') {
        if (comentariosSection) {
            comentariosSection.style.display = 'block';
            comentariosSection.classList.add('active');
        }
        if (historicoSection) {
            historicoSection.style.display = 'none';
            historicoSection.classList.remove('active');
        }
        if (botoes[0]) botoes[0].classList.add('active');
    } 
    else if (aba === 'historico') {
        if (historicoSection) {
            historicoSection.style.display = 'block';
            historicoSection.classList.add('active');
            // Carregar histórico quando abrir a aba
            if (typeof carregarHistoricoVersoes === 'function') {
                carregarHistoricoVersoes();
            }
        }
        if (comentariosSection) {
            comentariosSection.style.display = 'none';
            comentariosSection.classList.remove('active');
        }
        if (botoes[1]) botoes[1].classList.add('active');
    }
}

async function carregarHistoricoVersoes() {
    
    if (!ideiaId) {
        console.error('❌ ideiaId não definido');
        return;
    }
    
    showLoading(true);
    
    try {
        const response = await fetch(`/ideias/${ideiaId}/versoes`);
        
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }
        
        const versoes = await response.json();
        
        const container = document.getElementById('listaVersoes');
        
        if (!container) {
            console.error('❌ Elemento listaVersoes não encontrado');
            return;
        }
        
        if (!versoes || versoes.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-history" style="font-size: 48px; color: #cbd5e0;"></i>
                    <p style="margin-top: 15px;">Nenhuma versão anterior encontrada.</p>
                    <small>Esta é a versão original da ideia.</small>
                </div>
            `;
            return;
        }
        
        container.innerHTML = versoes.map(versao => `
            <div class="versao-card">
                <div class="versao-header">
                    <span class="versao-numero">
                        <i class="fas fa-code-branch"></i> Versão ${versao.versao_numero}
                    </span>
                    <span class="versao-data">
                        <i class="far fa-calendar-alt"></i> ${formatarData(versao.data_alteracao)}
                    </span>
                    <span class="versao-autor">
                        <i class="fas fa-user-edit"></i> ${escapeHtml(versao.alterado_por_nome || 'Sistema')}
                    </span>
                </div>
                <div class="versao-titulo">
                    <strong><i class="fas fa-heading"></i> Título:</strong> ${escapeHtml(versao.titulo)}
                </div>
                <div class="versao-descricao">
                    <strong><i class="fas fa-align-left"></i> Descrição:</strong><br>
                    ${escapeHtml(versao.descricao)}
                </div>
                <div class="versao-categoria">
                    <i class="fas fa-tag"></i> ${escapeHtml(versao.categoria_nome || 'Sem categoria')}
                </div>
                <button onclick="verVersaoCompleta(${versao.id})" class="btn-ver-versao">
                    <i class="fas fa-eye"></i> Visualizar
                </button>
            </div>
        `).join('');
        
    } catch (error) {
        console.error('❌ Erro ao carregar histórico:', error);
        const container = document.getElementById('listaVersoes');
        if (container) {
            container.innerHTML = `
                <div class="error-state">
                    <i class="fas fa-exclamation-triangle" style="font-size: 48px; color: #dc3545;"></i>
                    <p>Erro ao carregar histórico de versões: ${error.message}</p>
                    <button onclick="carregarHistoricoVersoes()" class="btn-primary" style="margin-top: 15px;">Tentar novamente</button>
                </div>
            `;
        }
    } finally {
        showLoading(false);
    }
}

// SISTEMA DE NOTIFICAÇÕES EMPILHADAS
// ==========================================

let notificationQueue = [];
let activeNotifications = 0;
const MAX_VISIBLE = 5; // Máximo de notificações visíveis ao mesmo tempo

function mostrarNotificacao(mensagem, tipo = 'info', titulo = null) {
    // Definir títulos padrão por tipo
    const titulos = {
        success: '✅ Sucesso!',
        error: '❌ Erro!',
        info: 'ℹ️ Informação',
        warning: '⚠️ Atenção'
    };
    
    const tituloFinal = titulo || titulos[tipo] || 'Notificação';
    
    // Definir ícone por tipo
    const icones = {
        success: 'fa-heart',
        error: 'fa-exclamation-circle',
        info: 'fa-info-circle',
        warning: 'fa-exclamation-triangle'
    };
    
    const icone = icones[tipo] || 'fa-bell';
    
    // Criar elemento da notificação
    const notification = document.createElement('div');
    notification.className = `notification-toast ${tipo}`;
    notification.innerHTML = `
        <div class="notification-icon">
            <i class="fas ${icone}"></i>
        </div>
        <div class="notification-content">
            <div class="notification-title">${tituloFinal}</div>
            <div class="notification-message">${mensagem}</div>
        </div>
        <button class="notification-close" onclick="fecharNotificacao(this.parentElement)">
            <i class="fas fa-times"></i>
        </button>
        <div class="notification-progress"></div>
    `;
    
    // Adicionar ao container
    const container = document.getElementById('notificationContainer');
    if (!container) {
        console.error('Container de notificações não encontrado!');
        return;
    }
    
    container.appendChild(notification);
    activeNotifications++;
    
    // Verificar limite de visibilidade
    verificarLimiteNotificacoes();
    
    // Configurar remoção automática após 3 segundos
    const timeoutId = setTimeout(() => {
        fecharNotificacao(notification);
    }, 3000);
    
    // Armazenar timeout para cancelar se necessário
    notification.dataset.timeoutId = timeoutId;
    
    // Pausar animação ao passar o mouse
    notification.addEventListener('mouseenter', () => {
        clearTimeout(timeoutId);
        const progressBar = notification.querySelector('.notification-progress');
        if (progressBar) {
            progressBar.style.animationPlayState = 'paused';
        }
    });
    
    notification.addEventListener('mouseleave', () => {
        const newTimeoutId = setTimeout(() => {
            fecharNotificacao(notification);
        }, 1500);
        notification.dataset.timeoutId = newTimeoutId;
        
        const progressBar = notification.querySelector('.notification-progress');
        if (progressBar) {
            progressBar.style.animationPlayState = 'running';
        }
    });
}

function fecharNotificacao(notification) {
    if (!notification || notification.classList.contains('removing')) return;
    
    // Limpar timeout pendente
    if (notification.dataset.timeoutId) {
        clearTimeout(parseInt(notification.dataset.timeoutId));
    }
    
    notification.classList.add('removing');
    
    // Remover após animação
    setTimeout(() => {
        if (notification.parentNode) {
            notification.parentNode.removeChild(notification);
            activeNotifications--;
            verificarLimiteNotificacoes();
        }
    }, 300);
}

function verificarLimiteNotificacoes() {
    const container = document.getElementById('notificationContainer');
    if (!container) return;
    
    const notifications = container.querySelectorAll('.notification-toast:not(.removing)');
    
    // Se tiver mais que o máximo visível, remover a mais antiga
    if (notifications.length > MAX_VISIBLE) {
        const primeiraNotificacao = notifications[0];
        if (primeiraNotificacao) {
            fecharNotificacao(primeiraNotificacao);
        }
    }
}

// Limpar todas as notificações (útil ao sair da página)
function limparTodasNotificacoes() {
    const container = document.getElementById('notificationContainer');
    if (container) {
        const notifications = container.querySelectorAll('.notification-toast');
        notifications.forEach(notif => fecharNotificacao(notif));
    }
}

async function verVersaoCompleta(versaoId) {
    try {
        const response = await fetch(`/versoes/${versaoId}`);
        const versao = await response.json();
        
        // Criar modal para exibir versão completa
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.style.display = 'flex';
        modal.innerHTML = `
            <div class="modal-content modal-versao">
                <div class="modal-header">
                    <h3><i class="fas fa-history"></i> Versão ${versao.versao_numero}</h3>
                    <span onclick="this.closest('.modal').remove()" class="modal-close">&times;</span>
                </div>
                <div style="margin-bottom: 15px;">
                    <span class="versao-data"><i class="far fa-clock"></i> ${formatarData(versao.data_alteracao)}</span>
                    <span style="margin-left: 15px;"><i class="fas fa-user"></i> ${escapeHtml(versao.alterado_por_nome || 'Sistema')}</span>
                </div>
                <div class="form-group">
                    <label><strong>Título</strong></label>
                    <div class="versao-titulo-modal">${escapeHtml(versao.titulo)}</div>
                </div>
                <div class="form-group">
                    <label><strong>Descrição</strong></label>
                    <div class="versao-descricao-modal" style="background: #f8fafc; padding: 15px; border-radius: 8px; line-height: 1.6;">${escapeHtml(versao.descricao)}</div>
                </div>
                <div class="form-group">
                    <label><strong>Categoria</strong></label>
                    <div><span class="versao-categoria">${escapeHtml(versao.categoria_nome || 'Sem categoria')}</span></div>
                </div>
                <button onclick="this.closest('.modal').remove()" class="btn-primary">Fechar</button>
            </div>
        `;
        
        document.body.appendChild(modal);
        
        // Fechar modal ao clicar fora
        modal.addEventListener('click', (e) => {
            if (e.target === modal) modal.remove();
        });
        
    } catch (error) {
        console.error('❌ Erro ao carregar versão:', error);

        return data;

}
    
    function escapeHtml(text) {

function abrirSeletorAnexo() {

// ========== FUNÇÕES DO CARROSSEL ==========
function mudarImagem(direcao) {
    if (!window.imagensIdeia || window.imagensIdeia.length === 0) return;
    
    const total = window.imagensIdeia.length;
    let novoIndex = window.imagemAtualIndex + direcao;
    
    if (novoIndex < 0) novoIndex = total - 1;
    if (novoIndex >= total) novoIndex = 0;
    
    irParaImagem(novoIndex);
}

function irParaImagem(index) {
    if (!window.imagensIdeia || index >= window.imagensIdeia.length) return;
    
    window.imagemAtualIndex = index;
    const imagem = window.imagensIdeia[index];
    
    // Atualizar imagem
    const imgElement = document.getElementById('imagemAtual');
    if (imgElement) {
        imgElement.src = imagem.imagem_url;
        imgElement.alt = `Imagem ${index + 1}`;
    }
    
    // Atualizar indicadores
    document.querySelectorAll('.indicador').forEach((ind, i) => {
        if (i === index) {
            ind.classList.add('ativo');
        } else {
            ind.classList.remove('ativo');
        }
    });
}

// ========== FUNÇÕES DO MODAL DE IMAGEM ==========
let modalAtual = null;
let modalImagens = [];
let modalIndexAtual = 0;

function abrirModalImagem(imagens, index) {
    modalImagens = imagens;
    modalIndexAtual = index;
    
    // Criar modal
    modalAtual = document.createElement('div');
    modalAtual.className = 'modal-imagem';
    modalAtual.innerHTML = `
        <div class="modal-imagem-content">
            <span class="modal-imagem-close">&times;</span>
            <button class="modal-imagem-nav prev">‹</button>
            <img id="modalImagem" src="${imagens[index].imagem_url}" alt="Imagem ampliada">
            <button class="modal-imagem-nav next">›</button>
            <div class="modal-contador">${index + 1} / ${imagens.length}</div>
        </div>
    `;
    
    document.body.appendChild(modalAtual);
    modalAtual.style.display = 'flex';
    
    // Usar addEventListener
    const closeBtn = modalAtual.querySelector('.modal-imagem-close');
    const prevBtn = modalAtual.querySelector('.prev');
    const nextBtn = modalAtual.querySelector('.next');
    
    if (closeBtn) {
        closeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            fecharModalImagem();
        });
    }
    
    if (prevBtn) {
        prevBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            mudarModalImagem(-1);
        });
    }
    
    if (nextBtn) {
        nextBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            mudarModalImagem(1);
        });
    }
    
    modalAtual.addEventListener('click', (e) => {
        if (e.target === modalAtual) {
            fecharModalImagem();
        }
    });
    
    document.addEventListener('keydown', handleEscKey);
}

function mudarModalImagem(direcao) {
    if (!modalImagens.length) return;
    
    let novoIndex = modalIndexAtual + direcao;
    if (novoIndex < 0) novoIndex = modalImagens.length - 1;
    if (novoIndex >= modalImagens.length) novoIndex = 0;
    
    modalIndexAtual = novoIndex;
    
    const modalImg = document.getElementById('modalImagem');
    if (modalImg) {
        modalImg.src = modalImagens[modalIndexAtual].imagem_url;
    }
    
    const contador = document.querySelector('.modal-contador');
    if (contador) {
        contador.textContent = `${modalIndexAtual + 1} / ${modalImagens.length}`;
    }
}

function fecharModalImagem() {
    if (modalAtual) {
        modalAtual.remove();
        modalAtual = null;
    }
    document.removeEventListener('keydown', handleEscKey);
}

function handleEscKey(e) {
    if (e.key === 'Escape' && modalAtual) {
        fecharModalImagem();
    }
}

let ideiaAtual = null;

async function abrirModalEditarIdeia() {
    try {
        // Buscar dados atuais da ideia
        const response = await fetch(`/ideias/${ideiaId}?isAdmin=true`);
        ideiaAtual = await response.json();
        
        document.getElementById('editarIdeiaId').value = ideiaAtual.id;
        document.getElementById('editarTitulo').value = ideiaAtual.titulo;
        document.getElementById('editarDescricao').value = ideiaAtual.descricao;
        
        // Carregar categorias no select
        const catResponse = await fetch('/categorias');
        const categorias = await catResponse.json();
        const selectCategoria = document.getElementById('editarCategoria');
        selectCategoria.innerHTML = '<option value="">Selecione uma categoria</option>';
        categorias.forEach(cat => {
            const option = document.createElement('option');
            option.value = cat.id;
            option.textContent = `${cat.icone} ${cat.nome}`;
            if (cat.id === ideiaAtual.categoria_id) option.selected = true;
            selectCategoria.appendChild(option);
        });
        
        document.getElementById('modalEditarIdeia').style.display = 'flex';
    } catch (error) {
        console.error('Erro ao carregar dados para edição:', error);
        alert('Erro ao preparar edição');
    }
}

document.getElementById('formEditarIdeia')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const ideiaId = document.getElementById('editarIdeiaId').value;
    const titulo = document.getElementById('editarTitulo').value.trim();
    const descricao = document.getElementById('editarDescricao').value.trim();
    const categoria_id = document.getElementById('editarCategoria').value;
    
    if (!titulo || !descricao || !categoria_id) {
        mostrarNotificacao('Preencha todos os campos!', 'warning', '⚠️ Campos Obrigatórios');
        return;
    }
    
    showLoading(true);
    try {
        const response = await fetch(`/ideias/${ideiaId}/editar`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                titulo,
                descricao,
                categoria_id: parseInt(categoria_id),
                usuarioId: usuarioLogado.id
            })
        });
        
        const data = await response.json();
        
        if (data.sucesso) {
            // ✅ NOTIFICAÇÃO DE SUCESSO
            mostrarNotificacao(
                `Sua ideia foi atualizada para a versão ${data.versao}. O histórico foi salvo.`,
                'success',
                '✏️ Ideia Editada'
            );
            
            fecharModal('modalEditarIdeia');
            await carregarIdeia();
        } else {
            mostrarNotificacao(data.erro || 'Erro ao editar ideia', 'error', '❌ Falha na Edição');
        }
    } catch (error) {
        console.error('Erro:', error);
        mostrarNotificacao('Erro de conexão ao editar', 'error', '⚠️ Conexão Falhou');
    } finally {
        showLoading(false);
    }
});

// ========== FUNÇÕES DE MODERAÇÃO ==========
function abrirModalModeracao(ideiaId) {
    
    if (!usuarioLogado) {
        alert('Faça login para moderar');
        return;
    }
    
    if (usuarioLogado.cargo !== 'gestor' && usuarioLogado.cargo !== 'ti_staff') {
        alert('Acesso negado. Apenas administradores podem moderar.');
        return;
    }
    
    // Verificar se o elemento existe antes de tentar definir o valor
    const ideiaIdInput = document.getElementById('moderacaoIdeiaId');
    const modal = document.getElementById('modalModeracao');
    
    if (!ideiaIdInput) {
        console.error('Elemento moderacaoIdeiaId não encontrado!');
        alert('Erro ao abrir modal. Contate o administrador.');
        return;
    }
    
    if (!modal) {
        console.error('Modal de moderação não encontrado!');
        alert('Erro ao abrir modal. Contate o administrador.');
        return;
    }
    
    ideiaIdInput.value = ideiaId;
    modal.style.display = 'flex';
}

function fecharModalModeracao() {
    const modal = document.getElementById('modalModeracao');
    const form = document.getElementById('formModeracao');
    
    if (modal) {
        modal.style.display = 'none';
    }
    
    if (form) {
        form.reset();
    }
}

const formModeracao = document.getElementById('formModeracao');
if (formModeracao) {
    // Remover listeners antigos
    const novoFormModeracao = formModeracao.cloneNode(true);
    formModeracao.parentNode.replaceChild(novoFormModeracao, formModeracao);
    
    novoFormModeracao.addEventListener('submit', async function(event) {
        event.preventDefault();
        
        const ideiaId = document.getElementById('moderacaoIdeiaId')?.value;
        const motivo = document.getElementById('moderacaoMotivo')?.value;
        const justificativa = document.getElementById('moderacaoJustificativa')?.value;
        const acao = document.getElementById('moderacaoAcao')?.value;
        
        if (!motivo) {
            mostrarNotificacao('Selecione um motivo para a moderação!', 'warning', '⚠️ Motivo Obrigatório');
            return;
        }
        
        if (!usuarioLogado) {
            mostrarNotificacao('Faça login para moderar!', 'warning', '🔒 Login Necessário');
            return;
        }
        
        // Confirmar ação
        const confirmMsg = acao === 'excluir' 
            ? '⚠️ ATENÇÃO: Esta ação irá EXCLUIR PERMANENTEMENTE a ideia. Deseja continuar?'
            : '⚠️ Confirmar advertência para este usuário?';
            
        if (!confirm(confirmMsg)) return;
        
        showLoading(true);
        
        try {
            const response = await fetch(`/admin/moderar/ideia/${ideiaId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    adminId: usuarioLogado.id,
                    motivo: motivo,
                    justificativa: justificativa,
                    acao: acao
                })
            });
            
            const data = await response.json();
            
            if (data.sucesso) {
                // Notificação de sucesso
                mostrarNotificacao(data.mensagem, 'success', acao === 'excluir' ? '🗑️ Ideia Excluída' : '⚠️ Advertência Aplicada');
                
                fecharModalModeracao();
                
                // Redirecionar ou recarregar
                if (acao === 'excluir') {
                    // Aguarda 1.5 segundos para mostrar a notificação e redireciona
                    setTimeout(() => {
                        window.location.href = '../index.html';
                    }, 1500);
                } else {
                    // Recarregar a página para atualizar o status
                    setTimeout(() => {
                        window.location.reload();
                    }, 1500);
                }
            } else {
                mostrarNotificacao(data.erro || '❌ Erro ao processar moderação', 'error', '❌ Falha na Moderação');
            }
        } catch (error) {
            console.error('Erro:', error);
            mostrarNotificacao('Erro de conexão ao processar moderação', 'error', '⚠️ Conexão Falhou');
        } finally {
            showLoading(false);
        }
    });
}

// ==========================================
// FUNÇÃO PARA ENVIAR COMENTÁRIO (COM FORM DATA)
// ==========================================
let enviandoComentario = false;

async function enviarComentario() {
    console.log('📝 enviarComentario chamada');
    
    // Evitar envio duplicado
    if (enviandoComentario) {
        console.log('⚠️ Já enviando comentário, aguarde...');
        return;
    }
    
    // 1. VERIFICAR LOGIN
    const userSalvo = sessionStorage.getItem('ideaHubUser');
    if (!userSalvo) {
        mostrarNotificacao('Faça login para comentar!', 'warning', '🔒 Login Necessário');
        return;
    }
    
    let usuario;
    try {
        usuario = JSON.parse(userSalvo);
        console.log('✅ Usuário logado:', usuario.nome);
    } catch(e) {
        mostrarNotificacao('Erro ao verificar usuário', 'error', '❌ Erro');
        return;
    }
    
    // 2. OBTER TEXTO DO COMENTÁRIO
    const texto = document.getElementById('novoComentario')?.value.trim();
    if (!texto) {
        mostrarNotificacao('Digite um comentário!', 'warning', '⚠️ Campo Vazio');
        return;
    }
    
    // 3. VERIFICAR SE ideiaId EXISTE
    if (!ideiaId) {
        mostrarNotificacao('Erro: ID da ideia não encontrado', 'error', '❌ Erro');
        return;
    }
    
    enviandoComentario = true;
    showLoading(true);
    
    try {
        // 4. PREPARAR FORM DATA
        const formData = new FormData();
        formData.append('texto', texto);
        formData.append('id_usuario', usuario.id);
        
        const arquivoInput = document.getElementById('anexoComentario');
        let temAnexo = false;
        
        if (arquivoInput && arquivoInput.files && arquivoInput.files[0]) {
            formData.append('anexo', arquivoInput.files[0]);
            temAnexo = true;
            console.log('📎 Anexo incluído:', arquivoInput.files[0].name);
        }
        
        // 5. ENVIAR REQUISIÇÃO (NÃO usar headers com FormData)
        const fetchResponse = await fetch(`/ideias/${ideiaId}/comentarios`, {
            method: 'POST',
            body: formData  // Sem headers 'Content-Type' - o browser define automaticamente
        });
        
        console.log('📡 Status da resposta:', fetchResponse.status);
        
        // 6. PROCESSAR RESPOSTA
        const data = await fetchResponse.json();
        
        if (fetchResponse.ok && data.sucesso) {
            // Limpar campos
            document.getElementById('novoComentario').value = '';
            if (arquivoInput) arquivoInput.value = '';
            document.getElementById('nomeAnexoSelecionado').innerHTML = '';
            
            // Recarregar comentários
            await carregarComentarios();
            
            // Mensagem de sucesso
            if (temAnexo) {
                mostrarNotificacao('Comentário enviado com anexo!', 'success', '📎 Anexo Incluído');
            } else {
                mostrarNotificacao('Comentário adicionado com sucesso!', 'success', '✅ Enviado');
            }
        } else {
            mostrarNotificacao(data.erro || 'Erro ao enviar comentário', 'error', '❌ Falha');
        }
        
    } catch (error) {
        console.error('❌ Erro no envio:', error);
        mostrarNotificacao('Erro de conexão. Tente novamente.', 'error', '⚠️ Erro');
    } finally {
        showLoading(false);
        enviandoComentario = false;
    }
}

// ==========================================
// MOSTRAR NOME DO ANEXO SELECIONADO
// ==========================================
function atualizarNomeAnexo() {
    const input = document.getElementById('anexoComentario');
    const nomeSpan = document.getElementById('nomeAnexoSelecionado');
    
    if (input && input.files && input.files[0]) {
        const file = input.files[0];
        const maxSize = 5 * 1024 * 1024; // 5MB
        const allowedTypes = ['image/jpeg', 'image/jpg', 'image/png', 'image/gif', 'image/webp', 'application/pdf'];
        
        if (file.size > maxSize) {
            mostrarNotificacao('Arquivo muito grande! Máximo 5MB.', 'warning', '⚠️ Arquivo Grande');
            input.value = '';
            nomeSpan.innerHTML = '';
            return;
        }
        
        if (!allowedTypes.includes(file.type)) {
            mostrarNotificacao('Tipo de arquivo não suportado. Use imagens ou PDF.', 'warning', '⚠️ Tipo Inválido');
            input.value = '';
            nomeSpan.innerHTML = '';
            return;
        }
        
        nomeSpan.innerHTML = `<i class="fas fa-paperclip"></i> ${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
        console.log('✅ Arquivo selecionado:', file.name);
    } else {
        nomeSpan.innerHTML = '';
    }
}

// ========== FUNÇÃO PARA CARREGAR COMENTÁRIOS (CORRIGIDA) ==========
async function carregarComentarios() {

    console.log('📌 usuarioLogado:', usuarioLogado);
    console.log('📌 ID do usuário logado:', usuarioLogado?.id);
    
    if (!ideiaId) {
        console.error('❌ ideiaId não definido');
        return;
    }
    
    try {
        const response = await fetch(`/ideias/${ideiaId}/comentarios`);
        
        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }
        
        const comentarios = await response.json();
        
        const comentariosCount = document.getElementById('comentariosCount');
        if (comentariosCount) comentariosCount.textContent = comentarios.length;
        
        const listaComentarios = document.getElementById('listaComentarios');
        
        if (!listaComentarios) {
            console.error('Elemento listaComentarios não encontrado');
            return;
        }
        
        if (comentarios.length === 0) {
            listaComentarios.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-comment-dots"></i>
                    <p>Nenhum comentário ainda. Seja o primeiro a comentar!</p>
                </div>
            `;
            return;
        }
        
        // ✅ BUSCAR AUTOR DA IDEIA
        let autorIdeiaId = null;
        if (window.ideiaAtual && window.ideiaAtual.id_usuario) {
            autorIdeiaId = window.ideiaAtual.id_usuario;
            console.log('✅ Autor da ideia:', autorIdeiaId);
        } else {
            try {
                const ideiaResponse = await fetch(`/ideias/${ideiaId}`);
                const ideia = await ideiaResponse.json();
                autorIdeiaId = ideia.id_usuario;
                console.log('✅ Autor da ideia (fetch):', autorIdeiaId);
            } catch (err) {
                console.error('Erro ao buscar autor:', err);
            }
        }
        
        // ✅ VERIFICAR SE É ADMIN
        const isAdminUser = usuarioLogado && (usuarioLogado.cargo === 'gestor' || usuarioLogado.cargo === 'ti_staff');
        
        // ✅ VERIFICAR SE É AUTOR DA IDEIA
        const isAutorDaIdeia = usuarioLogado && parseInt(usuarioLogado.id) === parseInt(autorIdeiaId);
        
        console.log('🔍 Permissões:', {
            isAdminUser: isAdminUser,
            isAutorDaIdeia: isAutorDaIdeia,
            usuarioLogadoId: usuarioLogado?.id,
            autorIdeiaId: autorIdeiaId
        });
        
        listaComentarios.innerHTML = comentarios.map(com => {
            // ✅ VERIFICAR SE É AUTOR DO COMENTÁRIO
            const isAutorComentario = usuarioLogado && parseInt(usuarioLogado.id) === parseInt(com.id_usuario);
            
            // ==========================================
            // REGRAS DO BOTÃO EXCLUIR:
            // ==========================================
            // 1. ADMIN pode excluir QUALQUER comentário
            // 2. AUTOR DA IDEIA pode excluir comentários na sua própria ideia
            // 3. USUÁRIO COMUM só pode excluir SEU PRÓPRIO comentário

                podeExcluir = true;
                console.log(`✅ [ADMIN] Comentário ${com.id} - PODE EXCLUIR`);
            } 
            else if (isAutorDaIdeia) {
                // REGRA 2: Autor da ideia pode excluir comentários na sua própria ideia
                podeExcluir = true;
                console.log(`✅ [AUTOR DA IDEIA] Comentário ${com.id} - PODE EXCLUIR`);

const estrelasCheias = Math.min(nivel, 5);

 async function votar(ideiaId) {
    if (!usuarioLogado) {
        mostrarNotificacao('Faça login para votar!', 'warning', '🔒 Login Necessário');
        return;
    }
    
    const btnVotar = document.getElementById('votar-btn');
    if (btnVotar && btnVotar.disabled) return;
    
    const estavaVotado = btnVotar ? btnVotar.classList.contains('votado') : false;
    
    if (btnVotar) {
        btnVotar.disabled = true;
        btnVotar.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processando...';
    }
    
    showLoading(true);
    
    try {
        const response = await fetch(`/ideias/${ideiaId}/votar`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ usuarioId: usuarioLogado.id })
        });
        
        const data = await response.json();
        
        if (data.sucesso) {
            const isAdmin = usuarioLogado.cargo === 'gestor' || usuarioLogado.cargo === 'ti_staff';
            const ideiaResponse = await fetch(`/ideias/${ideiaId}?inc=false&isAdmin=${isAdmin}`);
            const ideiaAtualizada = await ideiaResponse.json();
            
            const contadorVotos = document.querySelector('.meta-tag .fa-thumbs-up')?.parentElement;
            if (contadorVotos) {
                contadorVotos.innerHTML = `<i class="fas fa-thumbs-up"></i> ${ideiaAtualizada.votos_count || 0} votos`;
            }
            
            if (data.acao === 'adicionado') {
                btnVotar.innerHTML = '<i class="fas fa-heart"></i> Votado';
                btnVotar.classList.add('votado');
                
                const icon = btnVotar.querySelector('i');
                if (icon) {
                    icon.style.animation = 'heartbeat 0.3s ease';
                    setTimeout(() => {
                        if (icon) icon.style.animation = '';
                    }, 300);
                }
                
                // ✅ NOTIFICAÇÃO DE SUCESSO
                mostrarNotificacao(
                    'Você apoiou esta ideia! O autor receberá pontos.',
                    'success',
                    'Voto Registrado'
                );
            } else {
                btnVotar.innerHTML = '<i class="fas fa-thumbs-up"></i> Votar';
                btnVotar.classList.remove('votado');
                btnVotar.style.background = '';
                
                // ✅ NOTIFICAÇÃO DE REMOÇÃO
                mostrarNotificacao(
                    'Seu voto foi removido. Você pode votar novamente.',
                    'info',
                    'Voto Removido'
                );
            }
        } else {
            if (estavaVotado) {
                btnVotar.innerHTML = '<i class="fas fa-heart"></i> Votado';
                btnVotar.classList.add('votado');
            } else {
                btnVotar.innerHTML = '<i class="fas fa-thumbs-up"></i> Votar';
                btnVotar.classList.remove('votado');
            }
            mostrarNotificacao(data.erro || 'Erro ao processar voto', 'error', '❌ Falha no Voto');
        }
    } catch (error) {
        console.error('Erro:', error);
        if (btnVotar) {
            if (estavaVotado) {
                btnVotar.innerHTML = '<i class="fas fa-heart"></i> Votado';
                btnVotar.classList.add('votado');
            } else {
                btnVotar.innerHTML = '<i class="fas fa-thumbs-up"></i> Votar';
                btnVotar.classList.remove('votado');
            }
        }
        mostrarNotificacao('Erro de conexão ao votar', 'error', '⚠️ Conexão Falhou');
    } finally {
        showLoading(false);
        if (btnVotar) {
            btnVotar.disabled = false;
        }
    }
}

        const nome = document.getElementById('projetoNome').value;
        const descricao = document.getElementById('projetoDescricao').value;

        showLoading(true);
        try {

                method: 'POST',

                body: JSON.stringify({
                    adminId: usuarioLogado.id,
                    nome: nome,
                    descricao: descricao,
                    responsavel: responsavel,
                    data_inicio: new Date().toISOString().split('T')[0],
                    prioridade: prioridade
                })
            });
            const data = await response.json();
            
            if (response.status === 401) {
                alert('Sessão expirada. Faça login novamente.');
                localStorage.removeItem('ideaHubToken');
                window.location.href = '../index.html';
                return;
            }
            
            if (data.sucesso) {

                fecharModal();
                await carregarIdeia();
            } else {
                alert(data.erro || 'Erro ao converter ideia');

        } catch (error) {
            console.error('Erro:', error);
            alert('Erro de conexão ao converter');
        } finally {
            showLoading(false);
        }
    }

        });
    }
    
    // Configurar botão de envio de comentário
const btnEnviar = document.getElementById('btnEnviarComentario');
if (btnEnviar) {
    // Remover listeners antigos
    const novoBtn = btnEnviar.cloneNode(true);
    btnEnviar.parentNode.replaceChild(novoBtn, btnEnviar);
    
    novoBtn.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        console.log('🔘 Botão de comentário clicado');
        enviarComentario();
    });
    console.log('✅ Botão de comentário configurado');
} else {
    console.error('❌ Botão btnEnviarComentario não encontrado');
}

    // ==========================================
    // 9. CONFIGURAR BOTÃO DE ABRIR ANEXO
    // ==========================================
    const btnAnexo = document.getElementById('btnAnexoComentario');
if (btnAnexo && !btnAnexo.hasAttribute('data-listener')) {
    btnAnexo.setAttribute('data-listener', 'true');
    
    // Remover onclick do HTML para evitar duplicação
    btnAnexo.removeAttribute('onclick');
    
    // Adicionar evento via JavaScript
    btnAnexo.addEventListener('click', function(e) {
        e.preventDefault();
        e.stopPropagation();
        console.log('🔘 Botão anexo clicado');
        const input = document.getElementById('anexoComentario');
        if (input) {
            input.click();
        }
    });
    console.log('✅ Botão de anexo configurado');
}
});

window.addEventListener('beforeunload', function() {
    if (typeof enviandoComentario !== 'undefined') {

function mostrarAvisoAdvertenciaExistente(data) {
    // Criar um modal de aviso customizado
    const modalAviso = document.createElement('div');
    modalAviso.className = 'modal-aviso';
    modalAviso.innerHTML = `
        <div class="modal-aviso-content">
            <div class="modal-aviso-header">
                <i class="fas fa-exclamation-triangle"></i>
                <h3>Ideia já Advertida</h3>
            </div>
            <div class="modal-aviso-body">
                <p>${data.mensagem}</p>
                <div class="aviso-detalhes">
                    <p><strong>📅 Data da advertência:</strong> ${data.dataAdvertencia}</p>
                    <p><strong>💡 O que fazer?</strong></p>
                    <ul>
                        <li>Esta ideia já foi notificada ao autor</li>
                        <li>Se o problema persistir, considere outras ações</li>
                        <li>Você pode excluir a ideia manualmente se necessário</li>
                    </ul>
                </div>
            </div>
            <div class="modal-aviso-footer">
                <button onclick="fecharModalAviso()" class="btn-primary">Entendi</button>
                <button onclick="abrirExclusaoManual()" class="btn-excluir">Excluir Ideia Manualmente</button>
            </div>
        </div>
    `;
    document.body.appendChild(modalAviso);
    modalAviso.style.display = 'flex';
}

function fecharModalAviso() {
    const modal = document.querySelector('.modal-aviso');
    if (modal) modal.remove();
}

function abrirExclusaoManual() {
    if (confirm('⚠️ Deseja excluir esta ideia manualmente? O autor será notificado.')) {
        const ideiaId = document.getElementById('moderacaoIdeiaId').value;
        deletarIdeia(ideiaId);
        fecharModalAviso();
        fecharModalModeracao();
    }
}

function fazerLogout() {
    localStorage.removeItem('ideaHubToken');
    window.location.href = '../index.html';
}

function atualizarUserInfo() {
    const tokenSalvo = localStorage.getItem('ideaHubToken');
    if (tokenSalvo) {
        try {
            const user = JSON.parse(tokenSalvo);
            const userNameSpan = document.getElementById('userNameMini');
            if (userNameSpan) {
                userNameSpan.textContent = user.nome;
            }
        } catch (e) {
            console.error('Erro:', e);
        }
    }
