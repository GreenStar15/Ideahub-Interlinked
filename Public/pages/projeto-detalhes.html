        let usuarioLogado = null;

        let arquivoUrlAtual = null;
        let nomeArquivoAtual = null;
        
        // Obter ID do projeto da URL
        const urlParams = new URLSearchParams(window.location.search);
        projetoId = urlParams.get('id');
        
        // Verificar login
        async function verificarLogin() {
            const tokenSalvo = localStorage.getItem('ideaHubToken');
            if (tokenSalvo) {
                try {
                    usuarioLogado = JSON.parse(tokenSalvo);
                    return true;
                } catch(e) {
                    window.location.href = '../index.html';
                }
            } else {
                window.location.href = '../index.html';
            }
            return false;
        }
        
        // Mostrar/Esconder loading
        function showLoading(show) {
            const loading = document.getElementById('loading');
            if (loading) loading.style.display = show ? 'flex' : 'none';
        }
        
        // Formatar data
        function formatarData(data) {
            if (!data) return 'Data inválida';
            try {
                return new Date(data).toLocaleDateString('pt-BR', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });

async function carregarEquipamentos() {
    showLoading(true);
    try {
        const response = await fetch(`/projetos/${projetoId}/equipamentos`);
        const equipamentos = await response.json();
        
        const container = document.getElementById('equipamentosList');
        
        if (!equipamentos || equipamentos.length === 0) {
            container.innerHTML = `
                <div class="empty-state-central">
                    <i class="fas fa-network-wired" style="font-size: 48px; color: #a0aec0;"></i>
                    <p style="margin-top: 15px;">Nenhum equipamento cadastrado</p>
                    <button onclick="abrirModalEquipamento()" class="btn-primary" style="margin-top: 15px;">
                        <i class="fas fa-plus"></i> Adicionar primeiro equipamento
                    </button>
                </div>
            `;
            return;
        }
        
        // Calcular custo total
        let custoTotal = 0;
        for (const eq of equipamentos) {
            let custo = parseFloat(eq.custo);
            if (isNaN(custo)) custo = 0;
            custoTotal += custo;
        }
        
        // Adicionar resumo de custo centralizado
        const resumoHTML = `
            <div class="resumo-planejamento">
                <div class="resumo-conteudo">
                    <div class="resumo-item">
                        <i class="fas fa-cubes"></i>
                        <span>Total de Equipamentos:</span>
                        <strong>${equipamentos.length}</strong>
                    </div>
                    <div class="resumo-item">
                        <i class="fas fa-dollar-sign"></i>
                        <span>Custo Total:</span>
                        <strong>R$ ${custoTotal.toFixed(2)}</strong>
                    </div>
                </div>
            </div>
        `;
        
        const equipamentosHTML = `
            <div class="equipamentos-grid">
                ${equipamentos.map(eq => {
                    const tipoIcone = getTipoIcone(eq.tipo);
                    const custoEquip = parseFloat(eq.custo) || 0;
                    return `
                        <div class="equipamento-card">
                            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                                <div>
                                    <h4 style="margin-bottom: 5px;">${tipoIcone} ${escapeHtml(eq.nome)}</h4>
                                    <small style="color: #666;">${escapeHtml(eq.fabricante || '')} ${escapeHtml(eq.modelo || '')}</small>
                                </div>
                                <div>
                                    <span style="background: #e2e8f0; padding: 4px 12px; border-radius: 20px; font-size: 12px;">💰 R$ ${custoEquip.toFixed(2)}</span>
                                </div>
                            </div>
                            ${eq.ip_address ? `<div style="margin-top: 10px;"><i class="fas fa-network-wired"></i> IP: ${escapeHtml(eq.ip_address)}</div>` : ''}
                            ${eq.observacoes ? `<div style="margin-top: 8px; font-size: 13px; color: #666;"><i class="fas fa-comment"></i> ${escapeHtml(eq.observacoes)}</div>` : ''}
                            <div style="margin-top: 12px;">
                                <button onclick="editarEquipamento(${eq.id})" class="btn-documento">
                                    <i class="fas fa-edit"></i> Editar
                                </button>
                                <button onclick="excluirEquipamento(${eq.id})" class="btn-documento btn-documento-excluir">
                                    <i class="fas fa-trash-alt"></i> Excluir
                                </button>
                            </div>
                        </div>
                    `;
                }).join('')}
            </div>
        `;
        
        container.innerHTML = resumoHTML + equipamentosHTML;
        
    } catch (error) {
        console.error('Erro:', error);
        document.getElementById('equipamentosList').innerHTML = `
            <div class="empty-state-central">
                <i class="fas fa-exclamation-triangle" style="font-size: 48px; color: #dc3545;"></i>
                <p style="margin-top: 15px;">Erro ao carregar equipamentos</p>
                <button onclick="carregarEquipamentos()" class="btn-primary" style="margin-top: 15px;">Tentar novamente</button>
            </div>
        `;
    } finally {
        showLoading(false);
    }
}

function getTipoIcone(tipo) {
    const icones = {
        'switch': '🔌',
        'roteador': '🌐',

        'access_point': '📡',

async function carregarPeriodos() {
    showLoading(true);
    try {
        const response = await fetch('/api/periodos');
        if (!response.ok) throw new Error('Erro ao buscar períodos');
        let periodos = await response.json();
        
        // Remove duplicatas
        const ids = new Set();
        const periodosUnicos = periodos.filter(p => {
            if (ids.has(p.id)) return false;
            ids.add(p.id);
            return true;
        });
        
        periodosLista = periodosUnicos;
        
        // Recarrega o calendário
        carregarCalendario();
        
    } catch (error) {
        console.error('❌ Erro ao carregar períodos:', error);
    } finally {
        showLoading(false);
    }
}

    if (periodo && periodo.id) {

        idInput.value = periodo.id;
        nomeInput.value = periodo.nome;
        dataInicioInput.value = periodo.data_inicio ? periodo.data_inicio.split('T')[0] : '';
        dataFimInput.value = periodo.data_fim ? periodo.data_fim.split('T')[0] : '';

let salvandoPeriodo = false;

async function salvarPeriodo(event) {
    event.preventDefault();
    
    if (salvandoPeriodo) {
        return;
    }
    salvandoPeriodo = true;
    
    const id = document.getElementById('periodoId').value;
    const nome = document.getElementById('periodoNome').value.trim();
    const data_inicio = document.getElementById('periodoDataInicio').value;
    const data_fim = document.getElementById('periodoDataFim').value;
    
    if (!nome) {
        alert('Nome do período é obrigatório');
        salvandoPeriodo = false;
        return;
    }
    if (!data_inicio || !data_fim) {
        alert('Datas de início e fim são obrigatórias');
        salvandoPeriodo = false;
        return;
    }
    if (new Date(data_inicio) > new Date(data_fim)) {
        alert('Data de início não pode ser maior que data de fim');
        salvandoPeriodo = false;
        return;
    }
    
    if (!usuarioLogado || (usuarioLogado.cargo !== 'gestor' && usuarioLogado.cargo !== 'ti_staff')) {
        alert('Apenas administradores podem criar/editar períodos');
        salvandoPeriodo = false;
        return;
    }
    
    showLoading(true);
    try {
        const url = id ? `/admin/periodos/${id}` : '/admin/periodos';
        const method = id ? 'PUT' : 'POST';
        const response = await fetch(url, {
            method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                nome,
                data_inicio,
                data_fim,
                adminId: usuarioLogado.id
            })
        });
        const data = await response.json();
        if (data.sucesso) {
            alert(id ? 'Período atualizado!' : 'Período criado!');
            fecharModal('modalPeriodo');
            await carregarPeriodos();
        } else {
            alert(data.erro || 'Erro ao salvar período');
        }
    } catch (error) {
        console.error('Erro:', error);
        alert('Erro de conexão');
    } finally {
        showLoading(false);
        salvandoPeriodo = false;
    }
}

// ========== CALENDÁRIO DE PERÍODOS ==========
let dataAtual = new Date();
let periodosLista = [];
let tooltipAtual = null;

function formatarDataISO(date) {
    return date.toISOString().split('T')[0];
}

function carregarCalendario() {
    if (!periodosLista) periodosLista = [];
    const ano = dataAtual.getFullYear();
    const mes = dataAtual.getMonth();
    const primeiroDia = new Date(ano, mes, 1);
    const diasNaSemana = primeiroDia.getDay();
    const totalDias = new Date(ano, mes + 1, 0).getDate();
    
    const grade = [];
    // Dias do mês anterior
    for (let i = 0; i < diasNaSemana; i++) {
        const data = new Date(ano, mes, -diasNaSemana + i + 1);
        grade.push({ date: data, isCurrentMonth: false });
    }
    // Dias do mês atual
    for (let i = 1; i <= totalDias; i++) {
        grade.push({ date: new Date(ano, mes, i), isCurrentMonth: true });
    }
    // Dias do próximo mês (para completar a grade 6x7)
    const totalCelulas = 42;
    const restante = totalCelulas - grade.length;
    for (let i = 1; i <= restante; i++) {
        const data = new Date(ano, mes + 1, i);
        grade.push({ date: data, isCurrentMonth: false });
    }
    
    renderizarCalendario(grade);
    document.getElementById('calendarioMes').innerHTML = dataAtual.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
}

// Gera uma cor consistente baseada no ID do período
function getCorPeriodo(id) {
    const cores = [
        '#667eea', '#48bb78', '#ed8936', '#e53e3e', '#805ad5',
        '#38b2ac', '#ecc94b', '#d53f8c', '#3182ce', '#38a169',
        '#d69e2e', '#dd6b20', '#c53030', '#6b46c1', '#319795'
    ];
    return cores[id % cores.length];
}

function renderizarCalendario(grade) {
    const container = document.getElementById('calendarioGrade');
    if (!container) return;
    
    // LIMPA O CONTEÚDO ANTES DE RENDERIZAR
    container.innerHTML = '';
    
    const diasSemana = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'];
    let html = diasSemana.map(dia => `<div class="calendario-dia-semana">${dia}</div>`).join('');
    
    grade.forEach(celula => {
        const dateStr = formatarDataISO(celula.date);
        const periodosDoDia = periodosLista.filter(p => {
            const inicio = p.data_inicio.split('T')[0];
            const fim = p.data_fim.split('T')[0];
            return dateStr >= inicio && dateStr <= fim;
        });
        
        let marcadoresHtml = '';
        periodosDoDia.forEach(p => {
    const cor = getCorPeriodo(p.id);
    marcadoresHtml += `
        <div class="periodo-marcador" data-periodo-id="${p.id}" 
             style="background-color: ${cor}; color: white;"
             onclick="event.stopPropagation(); editarPeriodo(${p.id})">
            ${p.nome.substring(0,12)}
        </div>
    `;
});
        
        let pinHtml = '';
        const isInicio = periodosLista.some(p => p.data_inicio.split('T')[0] === dateStr);
        const isFim = periodosLista.some(p => p.data_fim.split('T')[0] === dateStr);
        if (isInicio || isFim) {
            pinHtml = '<div class="pin" title="Início/Fim de período"></div>';
        }
        
        const classes = celula.isCurrentMonth ? 'calendario-dia' : 'calendario-dia calendario-dia-outro-mês';
        html += `
            <div class="${classes}" data-date="${dateStr}" onclick="abrirModalPeriodoData('${dateStr}')">
                ${pinHtml}
                <div class="numero-dia">${celula.date.getDate()}</div>
                ${marcadoresHtml}
            </div>
        `;
    });
    
    container.innerHTML = html;
}

// Funções auxiliares para tooltip
function handleMouseEnter(e) {
    const periodoId = this.dataset.periodoId;
    const periodo = periodosLista.find(p => p.id == periodoId);
    if (periodo && !window.tooltipAtual) {
        window.tooltipAtual = document.createElement('div');
        window.tooltipAtual.className = 'tooltip-periodo';
        window.tooltipAtual.innerHTML = `${periodo.nome}<br>${periodo.data_inicio.split('T')[0]} até ${periodo.data_fim.split('T')[0]}`;
        document.body.appendChild(window.tooltipAtual);
        window.tooltipAtual.style.left = (e.pageX + 10) + 'px';
        window.tooltipAtual.style.top = (e.pageY - 30) + 'px';
    }
}

function handleMouseLeave() {
    if (window.tooltipAtual) {
        window.tooltipAtual.remove();
        window.tooltipAtual = null;
    }
}

function navegarMes(direcao) {
    dataAtual.setMonth(dataAtual.getMonth() + direcao);
    carregarCalendario();
}

function abrirModalPeriodoData(dateStr) {
    const periodoFicticio = {
        id: null,
        nome: '',
        data_inicio: dateStr,
        data_fim: dateStr
    };
    abrirModalPeriodo(periodoFicticio);
}
