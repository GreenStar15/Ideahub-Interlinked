<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IdeaHub - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        .logo {
            max-width: 150px;
            margin-bottom: 20px;
        }
        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: #f1f5f9;
            cursor: pointer;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }
        .tab-btn.active {
            background: #667eea;
            color: white;
        }
        .form-container {
            text-align: left;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
        }
        .btn-primary {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }
        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }
        .alert-success {
            background: #dcfce7;
            color: #166534;
        }
        .alert-error {
            background: #fee2e2;
            color: #991b1b;
        }
        .links {
            margin-top: 20px;
            text-align: center;
        }
        .links a {
            color: #667eea;
            text-decoration: none;
            font-size: 13px;
            margin: 0 10px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <img src="../IdeaHub%20nobg.png" alt="IdeaHub Logo" class="logo" style="margin: 0 auto 20px; display: block;">
        <h1 style="color: #2d3748; margin-bottom: 10px;">💡 IdeaHub</h1>
        <p style="color: #718096; margin-bottom: 30px;">Faça login para compartilhar suas ideias</p>

        <div class="tab-buttons">
            <button id="btnLoginTab" class="tab-btn active" onclick="showLogin()">Entrar</button>
            <button id="btnCadastroTab" class="tab-btn" onclick="showCadastro()">Cadastrar</button>
        </div>

        <div id="loginForm" class="form-container">
            <div class="form-group">
                <input type="email" id="loginEmail" placeholder="Seu email">
            </div>
            <div class="form-group">
                <input type="password" id="loginSenha" placeholder="Sua senha">
            </div>
            <button onclick="fazerLogin()" class="btn-primary">Entrar</button>
            <div id="alertLogin" class="alert"></div>
        </div>

        <div id="cadastroForm" class="form-container" style="display: none;">
            <div class="form-group">
                <input type="text" id="cadastroNome" placeholder="Nome completo">
            </div>
            <div class="form-group">
                <input type="email" id="cadastroEmail" placeholder="Email">
            </div>
            <div class="form-group">
                <input type="password" id="cadastroSenha" placeholder="Senha (mínimo 6 caracteres)">
            </div>
            <div class="form-group">
                <select id="cadastroCargo">
                    <option value="aluno">👨‍🎓 Aluno</option>
                    <option value="professor">👨‍🏫 Professor</option>
                </select>
            </div>
            <button onclick="fazerCadastro()" class="btn-primary">Cadastrar</button>
            <div id="alertCadastro" class="alert"></div>
        </div>

        <div class="links">
            <a href="politica-privacidade.html">Política de Privacidade</a>
            <a href="termos-uso.html">Termos de Uso</a>
            <a href="creditos.html">Créditos</a>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        function showLogin() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('cadastroForm').style.display = 'none';
            document.getElementById('btnLoginTab').classList.add('active');
            document.getElementById('btnCadastroTab').classList.remove('active');
        }

        function showCadastro() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('cadastroForm').style.display = 'block';
            document.getElementById('btnCadastroTab').classList.add('active');
            document.getElementById('btnLoginTab').classList.remove('active');
        }

        function showMessage(message, type, target = 'alertLogin') {
            const alert = document.getElementById(target);
            alert.textContent = message;
            alert.className = `alert alert-${type}`;
            alert.style.display = 'block';
            setTimeout(() => {
                alert.style.display = 'none';
            }, 5000);
        }

        async function fazerLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const senha = document.getElementById('loginSenha').value;

            if (!email || !senha) {
                showMessage('Preencha email e senha!', 'error');
                return;
            }

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });

                const data = await response.json();

                if (response.ok && data.sucesso) {
                    // Salvar sessão
                    const tokenData = JSON.stringify({
                        id: data.usuario.id,
                        nome: data.usuario.nome,
                        email: data.usuario.email,
                        cargo: data.usuario.cargo
                    });
                    sessionStorage.setItem('ideaHubToken', tokenData);
                    localStorage.setItem('ideaHubToken', tokenData);

                    showMessage('Login realizado! Redirecionando...', 'success');
                    
                    // Redirecionar para home
                    setTimeout(() => {
                        window.location.href = 'pages/home.html';
                    }, 1000);
                } else {
                    showMessage(data.erro || 'Email ou senha incorretos!', 'error');
                    document.getElementById('loginSenha').value = '';
                }
            } catch (error) {
                showMessage('Erro de conexão', 'error');
            }
        }

        async function fazerCadastro() {
            const nome = document.getElementById('cadastroNome').value.trim();
            const email = document.getElementById('cadastroEmail').value.trim();
            const senha = document.getElementById('cadastroSenha').value;
            const cargo = document.getElementById('cadastroCargo').value;

            if (!nome || !email || !senha) {
                showMessage('Preencha todos os campos!', 'error', 'alertCadastro');
                return;
            }
            if (senha.length < 6) {
                showMessage('A senha deve ter pelo menos 6 caracteres!', 'error', 'alertCadastro');
                return;
            }

            try {
                const response = await fetch('/cadastrar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, email, senha, tipo: cargo })
                });

                const data = await response.json();

                if (response.ok && data.sucesso) {
                    showMessage('✅ Cadastro realizado! Faça login.', 'success', 'alertCadastro');
                    document.getElementById('cadastroNome').value = '';
                    document.getElementById('cadastroEmail').value = '';
                    document.getElementById('cadastroSenha').value = '';
                    showLogin();
                } else {
                    showMessage(data.erro || 'Erro ao cadastrar', 'error', 'alertCadastro');
                }
            } catch (error) {
                showMessage('Erro de conexão', 'error', 'alertCadastro');
            }
        }

        // Verificar se já está logado
        (function() {
            const token = sessionStorage.getItem('ideaHubToken') || localStorage.getItem('ideaHubToken');
            if (token) {
                try {
                    const user = JSON.parse(token);
                    if (user && user.id) {
                        // Já logado, redirecionar para home
                        window.location.href = 'pages/home.html';
                    }
                } catch(e) {}
            }
        })();
    </script>
</body>
</html>
